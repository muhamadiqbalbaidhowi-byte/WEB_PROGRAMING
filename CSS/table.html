<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
            }
        
        td, 
        th {
            border: 1px solid black;
            padding: 5px;
            }
        
        th {
            background-color: rgb(212, 198, 48);
            color: #fff;
            }


            tr {
                background-color: rgb(26, 255, 0);
                transition: 2s;
            }
            

        tr:nth-child(even){
            background-color: #c1d3d5;}

    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>NIM</th>
            </tr>
        </thead>
        <body>
            <tr>
               <td>1</td>
               <td>iqbal</td>
               <td>2302021033</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Bimo</td>
                <td>2302021001</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Jack</td>
                <td>2302021010</td>
            </tr>
        </body>
    </table>
</body>
</html>
