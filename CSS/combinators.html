<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinators</title>
    <style>
        div>a {
            color: red;
        }
        div {
            background-color: rgb(238, 255, 0);
        }

        div:hover  {
            background-color: green;
        }
    </style>
</head>

<body>
  <div>
    <p> ini teks dengan
        <a href="#">link</a>
    </p>
    <a href="#">Link 2</a>
    <a href="#">Link 3</a>
    <p></p>
    <p></p>
  </div>
</body>
</html>
