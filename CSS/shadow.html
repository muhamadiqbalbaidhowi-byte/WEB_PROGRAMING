<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow</title>
    <style>
        p {
            color: rgb(222, 250, 250);
            text-shadow: 1px 1px 2px rgb(5, 12, 3);
        }

        div {
            width: 50px;
            height: 50px;
            background-color: aquamarine;
            box-shadow: 0 0 3px black;
        }
    </style>
</head>
<body>
   <p>M IQBAL BAIDHOWI 1</p> 
   <div></div>
</body>
</html>
