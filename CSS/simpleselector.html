<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Selector</title>
    <style>
        p {
            color: blue;
            font-weight: bold;
        }
        #merah{
            color: red;
        }
        #hijau{
            color: green;
        }

        #kuning{
            color: yellow;
        }
        #magenta{
            color: magenta;
        }
    </style>
</head>
<body>
    <p>paragraf 1</p>
    <p>paragraf 2</p>
    <p>paragraf 3</p>

    <p class="merah">paragraf 4</p>
    <p class="merah">paragraf 5</p>
    <p class="merah">paragraf 6</p>

    <p id="hijau"> paragraf 7</p>
    <p id="kuning">paragraf 8</p>
    <p id="magenta"> paragraf 9</p>
    
</body>
</html>
